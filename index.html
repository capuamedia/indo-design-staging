  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #3d9b52; --green-dark: #2e7d41; --orange: #e8622f;
      --dark: #1a1a1a; --bg: #f3f2ee; --white: #fff;
      --muted: #6b6b6b; --border: #e2e0db;
      --ff: 'Barlow', sans-serif; --ffc: 'Barlow Condensed', sans-serif;
    }
    body { font-family: var(--ff); background: var(--bg); color: var(--dark); -webkit-font-smoothing: antialiased; overflow-x: hidden; }
    a { text-decoration: none; color: inherit; }
    button { cursor: pointer; border: none; font-family: var(--ff); }
    select { font-family: var(--ff); }
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 98; opacity: 0; pointer-events: none; transition: opacity .3s; }
    .overlay.active { opacity: 1; pointer-events: all; }
    @keyframes fadeSlideDown { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }
  </style>
</head>
<body>
  <div id="root"></div>
  <div id="overlay" class="overlay"></div>

  <script type="text/babel">

const { useState, useEffect, useCallback, useRef } = React;

// ──────────────────────────────────────────────────────────────────────
// TWEAKS DEFAULTS
// ──────────────────────────────────────────────────────────────────────
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "ctaColor": "green",
  "cardStyle": "enriched",
  "showTrustBar": true,
  "showQuiz": true,
  "showFeatured": true,
  "showSocialProof": true,
  "heroCopy": "Balance Your Body.\nElevate Your Game."
} /*EDITMODE-END*/;

// ──────────────────────────────────────────────────────────────────────
// PRODUCT DATA
// ──────────────────────────────────────────────────────────────────────
const PRODUCTS = [
{ id: 1, name: "The Original", variant: "Natural", price: 139, cat: "boards", series: "original", level: "Beginner+", rating: 4.8, reviews: 127, badge: "Best Seller", design: "natural", colors: ["#c8a882", "#1c1c3a", "#d4847c", "#7ba3cc", "#b090c0"] },
{ id: 2, name: "The Original", variant: "Cuby", price: 139, cat: "boards", series: "original", level: "Beginner+", rating: 4.7, reviews: 89, badge: null, design: "cuby", colors: ["#c07050", "#2a3890", "#8a9e6a"] },
{ id: 3, name: "The Original", variant: "Country Road", price: 139, cat: "boards", series: "original", level: "Beginner+", rating: 4.6, reviews: 62, badge: null, design: "countryroad", colors: ["#7a4a90", "#d06030"] },
{ id: 4, name: "The Original", variant: "Bamboo Beach", price: 139, cat: "boards", series: "original", level: "Beginner+", rating: 4.8, reviews: 74, badge: null, design: "bamboobeach", colors: ["#2080c0", "#e07030", "#30a060"] },
{ id: 5, name: "Ola Grande", variant: null, price: 139, cat: "boards", series: "original", level: "Beginner+", rating: 4.5, reviews: 43, badge: "New", design: "olagrande", colors: ["#102060", "#d0c8b8"] },
{ id: 6, name: "The Rocker", variant: "Natural", price: 149, cat: "boards", series: "rocker", level: "Intermediate+", rating: 4.9, reviews: 54, badge: "Top Rated", design: "rocker-natural", colors: ["#c8a882", "#1c1c3a"] },
{ id: 7, name: "The Rocker", variant: "Swirly", price: 149, cat: "boards", series: "rocker", level: "Intermediate+", rating: 4.9, reviews: 54, badge: null, design: "rocker-swirly", colors: ["#e0d8c0", "#1a1a1a"] },
{ id: 8, name: "The Rocker", variant: "Purple Rain", price: 149, cat: "boards", series: "rocker", level: "Intermediate+", rating: 4.9, reviews: 54, badge: null, design: "rocker-purple", colors: ["#4a2080", "#1a1060"] },
{ id: 9, name: "Original Roller", variant: null, price: 99, cat: "accessories", series: "accessories", level: null, rating: 4.7, reviews: 31, badge: null, design: "roller", colors: [] },
{ id: 10, name: "Foam Roller", variant: null, price: 59, cat: "accessories", series: "accessories", level: null, rating: 4.8, reviews: 7, badge: "Bundle & Save", design: "foam-roller", colors: [] },
{ id: 11, name: "Balance Cushion", variant: null, price: 65, cat: "accessories", series: "accessories", level: null, rating: 4.6, reviews: 28, badge: null, design: "cushion", colors: [], soldOut: true },
{ id: 12, name: "Indo Carpet", variant: "Heritage Logo", price: 179, cat: "accessories", series: "accessories", level: null, rating: 4.5, reviews: 12, badge: null, design: "carpet-heritage", colors: [] },
{ id: 13, name: "Indo Carpet", variant: "2025", price: 179, cat: "accessories", series: "accessories", level: null, rating: 4.4, reviews: 8, badge: "New", design: "carpet-2025", colors: [] },
{ id: 14, name: "Modern Logo T-Shirt", variant: null, price: 29.95, cat: "apparel", series: "apparel", level: null, rating: 4.7, reviews: 19, badge: null, design: "tshirt-dark", colors: [] },
{ id: 15, name: "Spiral T-Shirt", variant: null, price: 29.95, cat: "apparel", series: "apparel", level: null, rating: 4.6, reviews: 14, badge: null, design: "tshirt-light", colors: [] }];


// ──────────────────────────────────────────────────────────────────────
// BOARD IMAGE  (SVG illustrations per product type)
// ──────────────────────────────────────────────────────────────────────
const GRAD_MAP = {
  'natural': { stops: ['#d4c0a0', '#b08050'], angle: 150 },
  'cuby': { stops: ['#c07050', '#2a3890', '#8a9e6a'], angle: 135 },
  'countryroad': { stops: ['#9060a8', '#d46030'], angle: 130 },
  'bamboobeach': { stops: ['#2080c0', '#30a060', '#e07030'], angle: 140 },
  'olagrande': { stops: ['#0a1a50', '#1a4090', '#3060b0'], angle: 160 },
  'rocker-natural': { stops: ['#d4c0a0', '#b08050'], angle: 150 },
  'rocker-swirly': { stops: ['#e0d8c0', '#909090', '#1a1a1a'], angle: 135 },
  'rocker-purple': { stops: ['#6030a0', '#1a1060'], angle: 150 }
};

function BoardImage({ design, width = 160, height = 220, pid = 0 }) {
  const cx = width / 2,cy = height / 2;
  const isRocker = design && design.startsWith('rocker');
  const rx = isRocker ? width * 0.46 : width * 0.41;
  const ry = isRocker ? height * 0.44 : height * 0.47;
  const uid = `bi_${(design || 'x').replace(/[^a-z0-9]/g, '')}${width}p${pid}`;

  /* ── special shapes ── */
  if (design === 'roller' || design === 'foam-roller') {
    const isFoam = design === 'foam-roller';
    return (
      <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`} style={{ display: 'block' }}>
            <defs>
              <linearGradient id={uid + 'g'} x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor={isFoam ? "#686868" : "#505050"} />
                <stop offset="100%" stopColor="#1a1a1a" />
              </linearGradient>
            </defs>
            <rect x={width * 0.05} y={cy - 26} width={width * 0.9} height={52} rx={26} fill={`url(#${uid}g)`} />
            {isFoam && [...Array(5)].map((_, i) =>
        <line key={i} x1={width * 0.12 + i * width * 0.19} y1={cy - 26} x2={width * 0.12 + i * width * 0.19} y2={cy + 26} stroke="rgba(255,255,255,0.07)" strokeWidth="2" />
        )}
            <ellipse cx={cx} cy={cy + 44} rx={width * 0.32} ry={9} fill="rgba(0,0,0,0.07)" />
          </svg>);

  }
  if (design === 'cushion') {
    return (
      <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`} style={{ display: 'block' }}>
            <defs>
              <radialGradient id={uid + 'g'} cx="38%" cy="32%">
                <stop offset="0%" stopColor="#484848" />
                <stop offset="100%" stopColor="#0a0a0a" />
              </radialGradient>
            </defs>
            <circle cx={cx} cy={cy} r={width * 0.38} fill={`url(#${uid}g)`} />
            <circle cx={cx} cy={cy} r={width * 0.22} fill="none" stroke="rgba(255,255,255,0.1)" strokeWidth="1.5" />
            <ellipse cx={cx} cy={cy + width * 0.42} rx={width * 0.28} ry={8} fill="rgba(0,0,0,0.07)" />
          </svg>);

  }
  if (design === 'carpet-heritage' || design === 'carpet-2025') {
    const isH = design === 'carpet-heritage';
    return (
      <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`} style={{ display: 'block' }}>
            <rect x={width * 0.08} y={cy - height * 0.32} width={width * 0.84} height={height * 0.64} rx={6} fill="#111" />
            <text x={cx} y={cy + height * 0.07} textAnchor="middle"
        fill={isH ? "#f0c020" : "#fff"}
        fontSize={width * (isH ? 0.22 : 0.18)} fontWeight="800"
        fontFamily="'Barlow Condensed',sans-serif">
              {isH ? 'INDO' : '2025'}
            </text>
          </svg>);

  }
  if (design === 'tshirt-dark' || design === 'tshirt-light') {
    const isDk = design === 'tshirt-dark';
    const col = isDk ? '#2a2a2a' : '#e8e4dc';
    const tc = isDk ? 'rgba(255,255,255,0.45)' : 'rgba(0,0,0,0.3)';
    const tw2 = width * 0.65,th2 = height * 0.55;
    const tx = cx - tw2 / 2,ty = cy - th2 / 2;
    const sw = width * 0.2,nr = width * 0.1;
    return (
      <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`} style={{ display: 'block' }}>
            <path d={`M${tx + nr},${ty} L${tx - sw},${ty + height * 0.1} L${tx},${ty + height * 0.2} L${tx},${ty + th2} L${tx + tw2},${ty + th2} L${tx + tw2},${ty + height * 0.2} L${tx + tw2 + sw},${ty + height * 0.1} L${tx + tw2 - nr},${ty} Q${cx},${ty - height * 0.02} ${tx + nr},${ty}`} fill={col} />
            <text x={cx} y={cy + 6} textAnchor="middle" fill={tc} fontSize={width * 0.09} fontFamily="'Barlow',sans-serif" fontWeight="700">INDO BOARD</text>
          </svg>);

  }

  /* ── oval boards (default) ── */
  const g = GRAD_MAP[design] || GRAD_MAP['natural'];
  const rad = (g.angle - 90) * Math.PI / 180;
  const gx1 = (0.5 - 0.5 * Math.cos(rad)).toFixed(3);
  const gy1 = (0.5 - 0.5 * Math.sin(rad)).toFixed(3);
  const gx2 = (0.5 + 0.5 * Math.cos(rad)).toFixed(3);
  const gy2 = (0.5 + 0.5 * Math.sin(rad)).toFixed(3);
  return (
    <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`} style={{ display: 'block' }}>
          <defs>
            <linearGradient id={uid + 'g'} x1={gx1} y1={gy1} x2={gx2} y2={gy2}>
              {g.stops.map((c, i) =>
          <stop key={i} offset={`${Math.round(i / (g.stops.length - 1) * 100)}%`} stopColor={c} />
          )}
            </linearGradient>
            <clipPath id={uid + 'c'}><ellipse cx={cx} cy={cy} rx={rx} ry={ry} /></clipPath>
          </defs>
          <ellipse cx={cx} cy={cy} rx={rx} ry={ry} fill={`url(#${uid}g)`} />
          {(design === 'natural' || design === 'rocker-natural') && [...Array(7)].map((_, i) =>
      <line key={i} x1={cx + (i - 3.5) * rx / 4} y1={cy - ry - 10} x2={cx + (i - 3.5) * rx / 4 + 12} y2={cy + ry + 10}
      stroke="rgba(0,0,0,0.07)" strokeWidth="2" clipPath={`url(#${uid}c)`} />
      )}
          {design === 'olagrande' &&
      <path d={`M${cx - rx},${cy + ry * 0.15} Q${cx - rx * 0.3},${cy - ry * 0.2} ${cx},${cy + ry * 0.05} Q${cx + rx * 0.4},${cy + ry * 0.3} ${cx + rx},${cy + ry * 0.05}`}
      fill="none" stroke="rgba(255,255,255,0.22)" strokeWidth="3.5" clipPath={`url(#${uid}c)`} />
      }
          {design === 'rocker-swirly' && [...Array(4)].map((_, i) =>
      <line key={i} x1={cx + (i - 2) * rx / 3} y1={cy - ry - 10} x2={cx + (i - 2) * rx / 3 - 6} y2={cy + ry + 10}
      stroke="rgba(0,0,0,0.12)" strokeWidth="3" clipPath={`url(#${uid}c)`} />
      )}
          <ellipse cx={cx} cy={cy + ry + 14} rx={rx * 0.6} ry={9} fill="rgba(0,0,0,0.06)" />
        </svg>);

}

// ──────────────────────────────────────────────────────────────────────
// STARS
// ──────────────────────────────────────────────────────────────────────
function Stars({ rating, size = 13 }) {
  return (
    <span style={{ color: '#f0a820', fontSize: size, letterSpacing: -0.5, lineHeight: 1 }}>
          {'★'.repeat(Math.floor(rating))}{'☆'.repeat(5 - Math.floor(rating))}
        </span>);

}

// ──────────────────────────────────────────────────────────────────────
// PRODUCT CARD
// ──────────────────────────────────────────────────────────────────────
const BADGE_COLORS = {
  'Best Seller': { bg: '#1a1a1a', text: '#fff' },
  'Top Rated': { bg: '#f0a820', text: '#1a1a1a' },
  'New': { bg: '#3d9b52', text: '#fff' },
  'Bundle & Save': { bg: '#e8622f', text: '#fff' }
};

function ProductCard({ product, onAddToCart, ctaColor, enriched, featured = false, imgW = 155, imgH = 210 }) {
  const [hovered, setHovered] = useState(false);
  const [selColor, setSelColor] = useState(0);
  const ctaBg = ctaColor === 'green' ? '#3d9b52' : '#e8622f';
  const fullName = product.variant ? `${product.name} – ${product.variant}` : product.name;
  const priceStr = product.price % 1 === 0 ? `$${product.price}` : `$${product.price.toFixed(2)}`;
  const bc = product.badge && BADGE_COLORS[product.badge];

  return (
    <div
      onMouseEnter={() => setHovered(true)}
      onMouseLeave={() => setHovered(false)}
      style={{
        background: '#fff', borderRadius: 12, overflow: 'hidden', display: 'flex', flexDirection: 'column',
        boxShadow: hovered ? '0 8px 32px rgba(0,0,0,0.13)' : '0 2px 8px rgba(0,0,0,0.07)',
        transition: 'box-shadow .2s, transform .2s',
        transform: hovered ? 'translateY(-3px)' : 'translateY(0)',
        position: 'relative',
        ...(featured && { outline: '2px solid #3d9b52' })
      }}>

          {/* badges row */}
          <div style={{ position: 'absolute', top: 12, left: 12, right: 12, display: 'flex', justifyContent: 'space-between', zIndex: 2, pointerEvents: 'none' }}>
            {bc ?
        <span style={{ background: bc.bg, color: bc.text, fontSize: 10, fontWeight: 700, letterSpacing: 0.5, padding: '3px 8px', borderRadius: 4, textTransform: 'uppercase' }}>
                {product.badge}
              </span> :
        <span />}
            {product.level && enriched &&
        <span style={{ background: 'rgba(255,255,255,0.92)', color: '#555', fontSize: 10, fontWeight: 600, padding: '3px 8px', borderRadius: 4, border: '1px solid #e0e0e0' }}>
                {product.level}
              </span>
        }
          </div>
          {product.soldOut &&
      <div style={{ position: 'absolute', top: 12, right: 12, background: '#c84040', color: '#fff', fontSize: 10, fontWeight: 700, letterSpacing: 0.5, padding: '3px 8px', borderRadius: 4, zIndex: 3, textTransform: 'uppercase' }}>
              Sold Out
            </div>
      }

          {/* image */}
          <div style={{ background: '#f8f7f4', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '24px 16px', minHeight: featured ? 250 : 210 }}>
            <BoardImage design={product.design} width={imgW} height={imgH} pid={product.id} />
          </div>

          {/* info */}
          <div style={{ padding: '14px 16px 16px', display: 'flex', flexDirection: 'column', gap: 7, flexGrow: 1 }}>
            {enriched && product.reviews > 0 &&
        <div style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
                <Stars rating={product.rating} />
                <span style={{ fontSize: 12, color: '#999' }}>{product.rating} ({product.reviews})</span>
              </div>
        }
            <div>
              <div style={{ fontWeight: 700, fontSize: 15, lineHeight: 1.3 }}>{fullName}</div>
              <div style={{ display: 'flex', alignItems: 'baseline', gap: 8, marginTop: 3 }}>
                <span style={{ fontWeight: 800, fontSize: 17 }}>{priceStr}</span>
                {product.cat === 'boards' && enriched &&
            <span style={{ fontSize: 11, color: '#3d9b52', fontWeight: 600 }}>Bundle from ${product.price + 59} →</span>
            }
              </div>
            </div>
            {enriched && product.colors.length > 0 &&
        <div style={{ display: 'flex', gap: 5, alignItems: 'center', flexWrap: 'wrap' }}>
                {product.colors.map((c, i) =>
          <button key={i} onClick={() => setSelColor(i)}
          style={{ width: 16, height: 16, borderRadius: '50%', background: c, padding: 0, outline: 'none',
            border: selColor === i ? '2.5px solid #1a1a1a' : '1px solid rgba(0,0,0,0.15)',
            transition: 'transform .15s', transform: selColor === i ? 'scale(1.25)' : 'scale(1)', cursor: 'pointer' }} />
          )}
                {product.colors.length > 4 && <span style={{ fontSize: 11, color: '#aaa' }}>+{product.colors.length - 4}</span>}
              </div>
        }

            {/* CTAs */}
            <div style={{ marginTop: 'auto', paddingTop: 8, display: 'flex', flexDirection: 'column', gap: 6 }}>
              {enriched && !product.soldOut &&
          <button onClick={() => onAddToCart(product)}
          style={{ width: '100%', padding: '10px', borderRadius: 8, background: ctaBg, color: '#fff',
            fontWeight: 700, fontSize: 14, letterSpacing: 0.2,
            opacity: hovered ? 1 : 0,
            transform: hovered ? 'translateY(0)' : 'translateY(5px)',
            transition: 'opacity .2s, transform .2s' }}>
                  Quick Add to Cart
                </button>
          }
              {product.soldOut &&
          <button disabled style={{ width: '100%', padding: '10px', borderRadius: 8, background: '#e8e8e8', color: '#aaa', fontWeight: 700, fontSize: 14 }}>
                  Sold Out
                </button>
          }
              <button style={{ width: '100%', padding: '9px', borderRadius: 8, background: 'transparent', border: '1.5px solid #d4d0cb', color: '#1a1a1a', fontWeight: 600, fontSize: 14 }}>
                View Details
              </button>
            </div>
          </div>
        </div>);

}

// ──────────────────────────────────────────────────────────────────────
// ANNOUNCEMENT BAR
// ──────────────────────────────────────────────────────────────────────
const MSGS = [
"🚚  FREE USA SHIPPING ON ALL ORDERS",
"💰  BUNDLE & SAVE UP TO 20% — BUILD YOUR SET BELOW",
"🏥  HSA / FSA ELIGIBLE · INJURY PREVENTION & REHAB"];

function AnnouncementBar() {
  const [idx, setIdx] = useState(0);
  const [fade, setFade] = useState(true);
  useEffect(() => {
    const t = setInterval(() => {
      setFade(false);
      setTimeout(() => {setIdx((i) => (i + 1) % MSGS.length);setFade(true);}, 300);
    }, 3800);
    return () => clearInterval(t);
  }, []);
  return (
    <div style={{ background: '#3d9b52', color: '#fff', textAlign: 'center', padding: '9px 16px', fontSize: 13, fontWeight: 600, letterSpacing: 0.4 }}>
          <span style={{ transition: 'opacity .3s', opacity: fade ? 1 : 0 }}>{MSGS[idx]}</span>
        </div>);

}

// ──────────────────────────────────────────────────────────────────────
// HEADER
// ──────────────────────────────────────────────────────────────────────
function Header({ cartCount, onCartOpen }) {
  return (
    <header style={{ background: '#fff', borderBottom: '1px solid #ebe9e4', padding: '0 48px', display: 'flex', alignItems: 'center', height: 64, position: 'sticky', top: 0, zIndex: 50 }}>
          {/* Logo */}
          <div style={{ marginRight: 'auto', fontFamily: "'Barlow Condensed',sans-serif", fontWeight: 800, fontSize: 26, display: 'flex', alignItems: 'center', gap: 1, letterSpacing: -0.5 }}>
            <span>indo</span>
            <svg width="16" height="16" viewBox="0 0 16 16" style={{ margin: '0 1px 0 0' }}>
              <circle cx="8" cy="8" r="7" fill="#3d9b52" />
              <line x1="8" y1="3" x2="8" y2="13" stroke="#fff" strokeWidth="1.5" />
              <line x1="3" y1="8" x2="13" y2="8" stroke="#fff" strokeWidth="1.5" />
            </svg>
            <span>board</span>
          </div>
          {/* Nav */}
          <nav style={{ display: 'flex', gap: 32, fontSize: 14, fontWeight: 600 }}>
            <a href="#" style={{ color: '#3d9b52' }}>Balance Boards ▾</a>
            <a href="#" style={{ color: '#1a1a1a' }}>Training Use Cases ▾</a>
            <a href="#" style={{ color: '#1a1a1a' }}>Info ▾</a>
          </nav>
          {/* Cart */}
          <button onClick={onCartOpen} style={{ background: 'none', marginLeft: 36, position: 'relative', padding: 6 }}>
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" strokeWidth="2">
              <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z" /><line x1="3" y1="6" x2="21" y2="6" />
              <path d="M16 10a4 4 0 01-8 0" />
            </svg>
            {cartCount > 0 &&
        <span style={{ position: 'absolute', top: 0, right: 0, background: '#3d9b52', color: '#fff', borderRadius: '50%', width: 16, height: 16, fontSize: 10, fontWeight: 700, display: 'flex', alignItems: 'center', justifyContent: 'center', lineHeight: 1 }}>
                {cartCount}
              </span>
        }
          </button>
        </header>);

}

// ──────────────────────────────────────────────────────────────────────
// HERO
// ──────────────────────────────────────────────────────────────────────
function Hero({ heroCopy }) {

// ──────────────────────────────────────────────────────────────────────
// APP
// ──────────────────────────────────────────────────────────────────────
function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [cart, setCart] = useState([]);
  const [cartOpen, setCartOpen] = useState(false);
  const [activeFilter, setActiveFilter] = useState('all');
  const [sortBy, setSortBy] = useState('featured');
  const [quizVisible, setQuizVisible] = useState(true);

  const toggleOverlay = (on) => {
    const el = document.getElementById('overlay');
    if (el) el.classList.toggle('active', on);
  };

  const addToCart = useCallback((product) => {
    setCart((prev) => [...prev, product]);
    setCartOpen(true);
    toggleOverlay(true);
  }, []);

  const closeCart = useCallback(() => {
    setCartOpen(false);
    toggleOverlay(false);
  }, []);

  useEffect(() => {
    const el = document.getElementById('overlay');
    if (el) el.onclick = closeCart;
  }, [closeCart]);

  const filtered = PRODUCTS.
  filter((p) => activeFilter === 'all' || p.cat === activeFilter).
  sort((a, b) => {
    if (sortBy === 'price-asc') return a.price - b.price;
    if (sortBy === 'price-desc') return b.price - a.price;
    if (sortBy === 'rating') return b.rating - a.rating;
    return 0;
  });

  const enriched = t.cardStyle === 'enriched';

  return (
    <div>
          <AnnouncementBar />
          <Header cartCount={cart.length} onCartOpen={() => {const o = !cartOpen;setCartOpen(o);toggleOverlay(o);}} />
          <Hero heroCopy={t.heroCopy} />
          {t.showTrustBar && <TrustBar />}
          {t.showQuiz && quizVisible && <QuizBanner onClose={() => setQuizVisible(false)} />}
          <FilterBar active={activeFilter} onChange={setActiveFilter} sort={sortBy} onSort={setSortBy} />
          {t.showFeatured && activeFilter === 'all' &&
      <FeaturedSection onAddToCart={addToCart} ctaColor={t.ctaColor} enriched={enriched} />
      }
          <ProductGrid products={filtered} onAddToCart={addToCart} ctaColor={t.ctaColor} enriched={enriched} />
          <BundleSection ctaColor={t.ctaColor} onAddToCart={addToCart} />
          {t.showSocialProof && <SocialProof />}
          <Footer />

          <CartDrawer open={cartOpen} cart={cart} onClose={closeCart} ctaColor={t.ctaColor} onAddToCart={addToCart} />

          <TweaksPanel>
            <TweakSection label="CTA + Cards" />
            <TweakRadio label="Button Color" value={t.ctaColor}
        options={['green', 'orange']}
        onChange={(v) => setTweak('ctaColor', v)} />
            <TweakRadio label="Card Mode" value={t.cardStyle}
        options={['enriched', 'minimal']}
        onChange={(v) => setTweak('cardStyle', v)} />
            <TweakSection label="Sections" />
            <TweakToggle label="Trust Bar" value={t.showTrustBar} onChange={(v) => setTweak('showTrustBar', v)} />
            <TweakToggle label="Board Finder Quiz" value={t.showQuiz} onChange={(v) => setTweak('showQuiz', v)} />
            <TweakToggle label="Most Popular Row" value={t.showFeatured} onChange={(v) => setTweak('showFeatured', v)} />
            <TweakToggle label="Social Proof Strip" value={t.showSocialProof} onChange={(v) => setTweak('showSocialProof', v)} />
            <TweakSection label="Hero" />
            <TweakText label="Headline" value={t.heroCopy} onChange={(v) => setTweak('heroCopy', v)} />
          </TweaksPanel>
        </div>);

}
